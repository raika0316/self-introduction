<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>自己紹介</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }
    img {
      width: 200px;
      border-radius: 10px;
    }
    table {
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #333;
      padding: 8px 12px;
    }
    th {
      background-color: #eee;
    }
    button {
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>自己紹介</h1>

  <!-- 基本情報 -->
  <p><strong>名前:</strong> 箱山 来佳（はこやま らいか）</p>
  <p><strong>誕生日:</strong> 2005年3月16日 21歳</p>
  <p><strong>出身:</strong> 長野県長野市</p>
  <p><strong>大学:</strong> 金沢工業大学 環境・応用化学科</p>
  <p><strong>専攻:</strong> 土や海で分解するプラスチック（学長の研究室）</p>
  <p><strong>趣味:</strong> サッカー、音楽、料理、旅行、占い</p>
  <p><strong>MBTI:</strong> 討論者 ENTP-T</p>

  <!-- 画像 -->
  <h2>プロフィール画像</h2>
  <img src="images/Sousy-Dog.jpeg" alt="大好きなもの1">
  <img src="images/Umageki.jpg" alt="大好きなもの2">
  <img src="images/Shodo.jpeg" alt="2026年目標">


  <!-- 目標テーブル -->
  <h2>入社までの目標</h2>

  <table id="goalTable">
    <tr>
      <th>期限</th>
      <th>目標</th>

    </tr>
    <tr>
      <td contenteditable="true">2026年3～4月</td>
      <td contenteditable="true">HTMLとCSSを習得</td>
    </tr>
    <tr>
      <td contenteditable="true">2026年5～6月</td>
      <td contenteditable="true">JavaScriptを理解</td>
    </tr>
  </table>

  <button onclick="addRow()">行を追加</button>

  <script>
    function addRow() {
      const table = document.getElementById("goalTable");
      const newRow = table.insertRow();

      const cell1 = newRow.insertCell(0);
      const cell2 = newRow.insertCell(1);

      cell1.contentEditable = "true";
      cell2.contentEditable = "true";

      cell1.innerText = "期限";
      cell2.innerText = "目標";
    }
  </script>

</body>
</html>
